# Configuración local de Supabase CLI para CloudWeb.
# Solo afecta a `supabase start` en la máquina del desarrollador.
# Producción se configura desde el dashboard.

project_id = "cloudweb"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
# Captura emails enviados durante development para verificar magic links.
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
# Magic link + Google OAuth como métodos de login.
# Sin password.
enable_signup = true
enable_confirmations = false
double_confirm_changes = true
secure_password_change = false

# OTP / magic link
[auth.email.template.invite]
subject = "Bienvenida a CloudWeb"

[auth.email.template.magic_link]
subject = "Tu enlace de acceso a CloudWeb"

# Google OAuth
# Para desarrollo local: crea credenciales OAuth en console.cloud.google.com
# → APIs & Services → Credentials → OAuth 2.0 Client IDs
# → Tipo: Web application
# → Redirect URI: http://localhost:54321/auth/v1/callback
#
# Para producción: configúralo desde el dashboard de Supabase.
[auth.external.google]
enabled = true
client_id = "env(GOOGLE_OAUTH_CLIENT_ID)"
secret = "env(GOOGLE_OAUTH_CLIENT_SECRET)"
# redirect_uri lo maneja Supabase automáticamente

[storage]
enabled = false
# No usamos storage en MVP (decisión #6: URLs externas).
